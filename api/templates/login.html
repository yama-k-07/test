<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>まもっち - LOGIN</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            max-width: 400px;
            width: 90%;
            text-align: center;
        }
        .login-logo {
            margin-bottom: 2rem;
            animation: bounce 2s infinite ease-in-out;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="box login-card">
            <div class="login-logo">
                <img src="{{url_for('static', filename='banner.png')}}" class="site-icon" alt="まもっち">
            </div>
            
            <h1 class="subtitle" id="modeTitle" style="margin-top: 0; margin-left: 0;">ADMIN ACCESS</h1>

            <div class="field">
                <div class="control">
                    <input class="input" type="email" placeholder="OPERATOR EMAIL">
                </div>
            </div>

            <div class="field">
                <div class="control">
                    <input class="input" type="password" placeholder="PASSWORD">
                </div>
            </div>

            <button class="button is-primary is-fullwidth mt-5" id="actionBtn">
                SYSTEM START
            </button>

            <p class="mt-3">
                <a id="toggleLink" style="font-size:0.8rem; opacity:0.7;">アカウントを作成する</a>
            </p>

            <p class="mt-2 is-size-7" style="opacity: 0.6;">© 2024 MAMOTCHI SYSTEM Ver 1.0.2</p>
        </div>
    </div>

<script>
    let mode = 'login';

    document.getElementById('toggleLink').addEventListener('click', () => {
        mode = mode === 'login' ? 'signup' : 'login';
        document.getElementById('modeTitle').textContent = mode === 'login' ? 'ADMIN ACCESS' : 'NEW OPERATOR';
        document.getElementById('actionBtn').textContent = mode === 'login' ? 'SYSTEM START' : 'REGISTER';
        document.getElementById('toggleLink').textContent = mode === 'login' ? 'アカウントを作成する' : 'ログインに戻る';
    });

    document.getElementById('actionBtn').addEventListener('click', async () => {
        const email = document.querySelector('input[type="email"]').value.trim();
        const password = document.querySelector('input[type="password"]').value.trim();
        const btn = document.getElementById('actionBtn');

        btn.classList.add('is-loading');
        btn.disabled = true;

        try {
            const res = await fetch('/', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ email, password, mode })
            });
            const data = await res.json();
            if (data.status === "success") {
                window.location.href = data.redirect;
            } else {
                alert(data.message || 'エラーが発生しました');
            }
        } catch {
            alert('通信エラーが発生しました');
        } finally {
            btn.classList.remove('is-loading');
            btn.disabled = false;
        }
    });
</script>
</body>
</html>
