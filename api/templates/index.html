<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Area 管理ダッシュボード</title>
  <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
  <link rel="stylesheet" href="{{url_for('static', filename='style.css')}}">
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
</head>

<body class="">
  <main class="section">

    <header class="header">
      <div class="container">
        <img src="{{url_for('static', filename='banner.png')}}" class="site-icon" alt="まもっち">
      </div>
    </header>




    <section class="box">
      <h2 class="subtitle">エリアごとの状態</h2>
      <div style="text-align: left;">← トンネル外側</div><br>
      <div id="areaBoard" class="area-board"></div>
      <br>
      <div style="text-align: right;">トンネル内側 →</div>
    </section>

    <div class="settings-container">

      <section class="box column-box">
        <h2 class="subtitle">エリア割当設定</h2>
        <div class="table-container">
          <table class="table is-fullwidth">
            <thead>
              <tr>
                <th>エリアID</th>
                <th>IPアドレス</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="areaTableBody"></tbody>
          </table>
        </div>
        <div class="buttons mt-2">
          <button class="button is-primary" onclick="addAreaRow()">新規追加</button>
          <button class="button is-success" onclick="saveAreaMapTable()">保存</button>
        </div>
      </section>

      <section class="box column-box">
        <h2 class="subtitle">接続先設定</h2>
        <div class="table-container">
          <table class="table is-fullwidth">
            <thead>
              <tr>
                <th>SSID</th>
                <th>パスワード</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="ssidTableBody"></tbody>
          </table>
        </div>
        <div class="buttons mt-2">
          <button class="button is-primary" onclick="addSsidRow()">新規追加</button>
          <button class="button is-success" onclick="saveSsidTable()">保存</button>
        </div>
      </section>

      <section class="box column-box">
        <h2 class="subtitle">簡易マップ</h2>
        <div class="table-container">
          <div class="inner-box">
            <p>エリア1</p>
            <p>エリア2</p>
            <p>エリア3</p>
          </div>
          <table class="table is-fullwidth">
            <tbody id="mapping"></tbody>
          </table>
        </div>
      </section>

    </div>
    </div>


    <footer class="footer">
      <div class="content has-text-centered">
        <p>まもっち © 2026. All Rights Reserved.</p>
        <a href="/logout" class="button is-small is-danger is-outlined">LOGOUT</a>
      </div>
    </footer>
  </main>

  <script src="{{ url_for('static', filename='admin.js') }}"></script>
</body>

</html>
